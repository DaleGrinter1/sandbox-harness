name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run pyright

      - name: Run tests
        run: uv run pytest

      - name: Validate execution plan state
        run: ./scripts/execplan/check.sh

      - name: Build package
        run: uv build

      - name: Check CLI help
        run: uv run sandbox --help

      - name: Check CLI schema
        run: uv run sandbox schema

      - name: Smoke installed wheel
        run: |
          python -m venv /tmp/modal-sandbox-sdk-smoke
          /tmp/modal-sandbox-sdk-smoke/bin/python -m pip install --upgrade pip
          /tmp/modal-sandbox-sdk-smoke/bin/python -m pip install dist/*.whl
          /tmp/modal-sandbox-sdk-smoke/bin/python -c "import sandbox, sandbox_cli; assert sandbox.Sandbox; assert sandbox_cli"
          /tmp/modal-sandbox-sdk-smoke/bin/sandbox schema
